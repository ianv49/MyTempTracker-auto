<!DOCTYPE html>
<html>
<head>
    <title>24hr Temp Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>iPhone Temp Monitor</h1>

    <div class="chart-container">
        <canvas id="tempChart"></canvas>
    </div>

    <table id="tempTable">
        <thead>
            <tr>
                <th>Time (Last 24h)</th>
                <th>Temp (°C)</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <script src="script.js"></script>
</body>
</html>
